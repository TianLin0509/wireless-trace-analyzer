name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Python tests
        run: python -m pytest -q
      - name: JavaScript syntax
        run: node --check wireless_trace_viewer_app/static/app.js
      - name: Offline incremental update
        shell: pwsh
        run: ./tests/test_offline_update.ps1
