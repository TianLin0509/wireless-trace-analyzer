name: release-packages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-build-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Python tests
        run: python -m pytest -q
      - name: JavaScript syntax
        run: node --check wireless_trace_viewer_app/static/app.js
      - name: Offline incremental update
        shell: pwsh
        run: ./tests/test_offline_update.ps1
      - name: Build full and incremental packages
        shell: pwsh
        run: ./tools/build-release-packages.ps1 -ToRef $env:GITHUB_REF_NAME
      - name: Publish GitHub release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $assets = @(Get-ChildItem -LiteralPath .\dist -File | ForEach-Object { $_.FullName })
          gh release create $env:RELEASE_TAG @assets --verify-tag --generate-notes --title "Wireless Trace Analyzer $env:RELEASE_TAG"
